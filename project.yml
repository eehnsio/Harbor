name: Harbor
options:
  bundleIdPrefix: com.erik
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
targets:
  Harbor:
    type: application
    platform: macOS
    sources:
      - Harbor
      - path: Harbor/Resources
        buildPhase: resources
    preBuildScripts:
      - name: Embed Git Hash
        script: |
          hash=$(git -C "$SRCROOT" rev-parse --short HEAD 2>/dev/null || echo "dev")
          /usr/libexec/PlistBuddy -c "Set :GitCommitHash $hash" "$SRCROOT/Harbor/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :GitCommitHash string $hash" "$SRCROOT/Harbor/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" "$SRCROOT/Harbor/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $MARKETING_VERSION" "$SRCROOT/Harbor/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$SRCROOT/Harbor/Info.plist" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "$SRCROOT/Harbor/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: Harbor/Info.plist
        CODE_SIGN_ENTITLEMENTS: Harbor/Harbor.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.erik.Harbor
        PRODUCT_NAME: Harbor
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
